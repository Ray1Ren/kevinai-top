<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f5f7">
  <title>原始 Prompt · Kevin AI局</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; min-height: 100dvh; }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px max(18px, calc((100vw - 1120px) / 2));
      border-bottom: 1px solid rgba(0, 0, 0, .08);
      background: rgba(245, 245, 247, .88);
      backdrop-filter: blur(18px);
    }
    strong { font-size: 15px; }
    a { color: #06c; font-size: 14px; text-decoration: none; }
    main { width: min(1120px, calc(100% - 32px)); margin: 28px auto 64px; }
    pre {
      min-height: 280px;
      margin: 0;
      padding: clamp(18px, 3vw, 34px);
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .06);
      font: 14px/1.75 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    [data-state="error"] { color: #b42318; }
    @media (prefers-color-scheme: dark) {
      :root { color-scheme: dark; background: #101316; color: #f5efe3; }
      header { background: rgba(16, 19, 22, .9); border-color: rgba(255, 255, 255, .1); }
      pre { background: #171b1f; border-color: rgba(255, 255, 255, .1); box-shadow: none; }
      a { color: #69a9ff; }
    }
  </style>
</head>
<body>
  <header>
    <strong id="title">原始 Prompt</strong>
    <a href="/recording-desk/">返回录制台</a>
  </header>
  <main><pre id="content" role="status" aria-live="polite">正在加载…</pre></main>
  <script>
    const files = {
      "2d-prompt.txt": "2D 游戏《弹弓攻城》原始 Prompt",
      "3d-prompt.txt": "3D 游戏《破门点》原始 Prompt",
      "promo-prompt.txt": "《一脚晋级》宣传页原始 Prompt",
      "vision-prompt.txt": "50 图视觉识别原始 Prompt"
    };
    const file = new URLSearchParams(location.search).get("file");
    const content = document.querySelector("#content");
    if (!file || !files[file]) {
      content.dataset.state = "error";
      content.textContent = "未找到这份公开 Prompt。";
    } else {
      document.querySelector("#title").textContent = files[file];
      document.title = `${files[file]} · Kevin AI局`;
      fetch(file)
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.arrayBuffer();
        })
        .then((buffer) => {
          content.removeAttribute("role");
          content.textContent = new TextDecoder("utf-8").decode(buffer);
        })
        .catch(() => {
          content.dataset.state = "error";
          content.textContent = "Prompt 加载失败，请返回录制台后重试。";
        });
    }
  </script>
</body>
</html>
