<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="description" content="K3、Codex 与 MiniMax M3 四类 AI 实测的公开实机录制台。">
  <link rel="icon" href="/favicon.svg">
  <title>K3 / Codex / MiniMax 四类评测录制台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101316;
      --panel: #171b1f;
      --panel-2: #1d2227;
      --panel-3: #242a30;
      --line: rgba(245, 239, 227, .13);
      --line-strong: rgba(245, 239, 227, .26);
      --text: #f5efe3;
      --muted: #aeb3b6;
      --accent: #e99a43;
      --accent-ink: #24170a;
      --accent-soft: rgba(233, 154, 67, .13);
      --green: #79c49c;
      --red: #ed8c82;
      --blue: #84a9c8;
      --sidebar: 374px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-width: 320px;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
    }

    button, a { font: inherit; }

    button {
      color: inherit;
      cursor: pointer;
    }

    button:active, a.button:active { transform: scale(.98); }

    button:focus-visible, a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .topbar {
      min-height: 82px;
      display: grid;
      grid-template-columns: minmax(210px, .8fr) minmax(510px, 1.5fr) minmax(295px, 1fr);
      align-items: center;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(16, 19, 22, .97);
      position: relative;
      z-index: 20;
    }

    .brand { min-width: 0; }

    .eyebrow {
      display: block;
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .brand strong {
      display: block;
      margin-top: 5px;
      font-size: 15px;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-tabs, .model-tabs {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel);
    }

    .category-tabs { justify-self: center; }

    .tab {
      min-height: 38px;
      padding: 8px 13px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }

    .tab:hover { color: var(--text); }

    .tab[aria-selected="true"] {
      color: var(--accent-ink);
      background: var(--accent);
    }

    .utility {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 12px;
      font-weight: 690;
      line-height: 1.2;
      text-decoration: none;
      white-space: nowrap;
      transition: background .16s ease, border-color .16s ease, transform .12s ease;
    }

    .button:hover {
      border-color: var(--line-strong);
      background: var(--panel-3);
    }

    .button.accent {
      border-color: rgba(233, 154, 67, .42);
      background: var(--accent-soft);
      color: #ffd39f;
    }

    .workspace {
      height: calc(100dvh - 82px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar);
    }

    .stage-column {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 14px;
      background:
        radial-gradient(circle at 18% 8%, rgba(233, 154, 67, .08), transparent 31%),
        var(--bg);
    }

    .stage-head {
      min-height: 49px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 2px 11px;
    }

    .current {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(121, 196, 156, .12);
      flex: 0 0 auto;
    }

    .current-copy { min-width: 0; }

    .current-copy strong {
      display: block;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .current-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .stage-actions {
      display: flex;
      gap: 7px;
    }

    .stage {
      position: relative;
      min-height: 0;
      flex: 1;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #0b0e10;
      box-shadow: 0 26px 72px rgba(0, 0, 0, .34);
    }

    .stage iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #111519;
    }

    .stage:fullscreen {
      width: 100vw;
      height: 100vh;
      border: 0;
      border-radius: 0;
      background: #0b0e10;
    }

    .stage:fullscreen iframe {
      width: 100vw;
      height: 100vh;
    }

    .loading-state, .error-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #111519;
      color: var(--muted);
      text-align: center;
      z-index: 3;
    }

    .loading-state[hidden], .error-state[hidden] { display: none; }

    .loading-line {
      width: 176px;
      height: 3px;
      margin: 14px auto 0;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, .08);
    }

    .loading-line::after {
      content: "";
      display: block;
      width: 55%;
      height: 100%;
      background: var(--accent);
      transform: translateX(-110%);
      animation: loading 1.2s ease-in-out infinite;
    }

    @keyframes loading {
      60%, 100% { transform: translateX(210%); }
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      border-left: 1px solid var(--line);
      background: var(--panel);
      scrollbar-width: thin;
    }

    .section + .section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .section-kicker {
      color: var(--muted);
      font-size: 10px;
      font-weight: 790;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .section h2, .section h3 {
      margin: 7px 0 0;
      letter-spacing: -.025em;
    }

    .section h2 { font-size: 22px; }
    .section h3 { font-size: 15px; }

    .stack-name {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 720;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 7px;
      font-size: 20px;
      letter-spacing: -.035em;
    }

    .metric small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
    }

    .verdict {
      margin: 12px 0 0;
      padding: 11px 12px;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      color: #f8ddbc;
      font-size: 12px;
      line-height: 1.65;
    }

    .fact-list, .record-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
    }

    .fact-list li, .record-list li {
      position: relative;
      padding-left: 17px;
      color: #d8dbdc;
      font-size: 12px;
      line-height: 1.65;
    }

    .fact-list li + li, .record-list li + li { margin-top: 7px; }

    .fact-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: .72em;
      width: 6px;
      height: 2px;
      background: var(--accent);
    }

    .record-list { counter-reset: steps; }

    .record-list li { padding-left: 27px; }

    .record-list li::before {
      counter-increment: steps;
      content: counter(steps);
      position: absolute;
      left: 0;
      top: .18em;
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--panel-3);
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 11px;
    }

    .action-grid .button { white-space: normal; text-align: center; }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.65;
    }

    .shortcut-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-bottom-color: var(--line-strong);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
    }

    .modal[hidden] { display: none; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(7, 9, 11, .84);
      backdrop-filter: blur(12px);
    }

    .modal-shell {
      width: min(1180px, 96vw);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 17px;
      background: var(--panel);
      box-shadow: 0 30px 100px rgba(0, 0, 0, .46);
    }

    .modal-head {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 15px 12px 20px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head strong { font-size: 15px; }

    .modal-body {
      min-height: 0;
      overflow: auto;
      padding: 20px;
    }

    .modal-body video {
      display: block;
      width: 100%;
      max-height: 76vh;
      border-radius: 12px;
      background: #0b0e10;
    }

    .official-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 20px;
      align-items: start;
    }

    .official-layout img {
      display: block;
      width: 100%;
      border-radius: 11px;
      background: #fff;
    }

    .official-copy {
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
    }

    .official-copy h3 { margin: 0; font-size: 18px; }

    .official-copy p {
      margin: 11px 0 0;
      color: #d8dbdc;
      font-size: 12px;
      line-height: 1.75;
    }

    .score-block + .score-block { margin-top: 24px; }

    .score-block h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: var(--panel-2);
      font-size: 12px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      line-height: 1.55;
    }

    tr:last-child td { border-bottom: 0; }

    th {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: #20262b;
    }

    td strong { color: var(--accent); }

    .gif-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .gif-item {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-2);
    }

    .gif-item img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: #0b0e10;
    }

    .gif-item span {
      display: block;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 11px;
    }

    @media (max-width: 1120px) {
      :root { --sidebar: 340px; }

      .topbar {
        grid-template-columns: minmax(175px, .75fr) minmax(480px, 1.5fr) auto;
      }

      .utility .hide-mid { display: none; }
    }

    @media (max-width: 920px) {
      body { overflow: auto; }

      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px;
      }

      .brand { text-align: center; }
      .category-tabs { justify-self: stretch; overflow-x: auto; }
      .category-tabs .tab { flex: 1 0 auto; }
      .utility { justify-content: center; flex-wrap: wrap; }

      .workspace {
        height: auto;
        min-height: calc(100dvh - 180px);
        grid-template-columns: 1fr;
      }

      .stage-column { min-height: 72dvh; }

      .sidebar {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .official-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .stage-head { align-items: flex-start; flex-direction: column; }
      .stage-actions { width: 100%; }
      .stage-actions .button { flex: 1; }
      .stage-column { min-height: 64dvh; padding: 10px; }
      .gif-grid { grid-template-columns: 1fr; }
      .modal { padding: 8px; }
      .modal-body { padding: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

      function buildModelTabs() {
        const host = $("#modelTabs");
        host.innerHTML = "";
        currentCategory().models.forEach((model, index) => {
          const button = document.createElement("button");
          button.className = "tab";
          button.type = "button";
          button.role = "tab";
          button.textContent = `${index + 1} ${model.label}`;
          button.setAttribute("aria-selected", String(index === state.model));
          button.addEventListener("click", () => setModel(index));
          host.appendChild(button);
        });
      }

      function makeLink(label, href, accent = false) {
        const link = document.createElement("a");
        link.className = "button" + (accent ? " accent" : "");
        link.textContent = label;
        link.href = href;
        link.target = "_blank";
        link.rel = "noopener";
        return link;
      }

        const model = currentModel();
        const grid = $("#evidenceGrid");
        grid.innerHTML = "";
        grid.append(
          makeLink("原始 Prompt", category.prompt, true),
          makeLink("评分结果", category.results),
          makeLink(state.category === "vision" ? "最终计分规则" : "Bug / 限制", category.bugs),
          makeLink("原始结果 JSON", category.summaryJson),
          makeLink("公开详情页", category.sourceFolder)
        );

        if (model.video) {
          const videoButton = document.createElement("button");
          videoButton.className = "button";
          videoButton.textContent = "播放现成录屏";
          videoButton.addEventListener("click", () => showVideo());
          grid.append(videoButton);
        }

        const extras = [...(category.extras || []), ...(model.extras || [])];
        extras.forEach(([label, href]) => grid.append(makeLink(label, href)));

        $("#evidenceNote").textContent = model.evidenceNote || (state.category === "vision"

      }

      function showScores() {
        const labels = {
          game2d: "2D 游戏《弹弓攻城》",
          game3d: "3D 游戏《破门点》",
          promo: "《一脚晋级》交互宣传页",
          vision: "50 图视觉识别（速度不计分）",
          overall: "四项等权总分（仅作本次样本汇总）"
        };
        const html = `<p class="note">本表与公众号公开配图一致：四类均为最终质量分，速度另列。MiniMax 2D / 3D 展示最终可交付版；37 与 29.81 等首轮含速度分仅在原始证据中作为内部旧口径保留。</p>` + Object.entries(scoreReasons).map(([key, rows]) => `
          <section class="score-block">
            <h3>${labels[key]}</h3>
            <div class="table-wrap"><table>
              <thead><tr><th>模型 / 调用链</th><th>${key === "vision" ? "准确率与稳定性" : key === "overall" ? "汇总方式" : "真实耗时"}</th><th>公众号质量分</th><th>为什么</th></tr></thead>
              <tbody>${rows.map((row) => `<tr><td>${row[0]}</td><td>${row[1]}</td><td><strong>${row[2]}</strong></td><td>${row[3]}</td></tr>`).join("")}</tbody>
            </table></div>
          </section>`).join("");
        openModal("公众号公开评分与原因", html);
      }

      function showGifs() {
        const html = `<div class="gif-grid">${gifItems.map(([file, label]) => `
          <a class="gif-item" href="/assets/gifs/${file}" target="_blank" rel="noopener">
            <img loading="lazy" src="/assets/gifs/${file}" alt="${label} 实机 GIF">
            <span>${label} · 点击单独打开原文件</span>
          </a>`).join("")}</div>`;
        openModal("已整理的实机 GIF 素材", html);
      }

      stageFrame.addEventListener("load", () => {
        clearTimeout(state.errorTimer);
        loadingState.hidden = true;
        errorState.hidden = true;
      });

      document.querySelectorAll(".category-tab").forEach((button) => {
        button.addEventListener("click", () => setCategory(button.dataset.category));
      });

      $("#reloadButton").addEventListener("click", reloadStage);
      $("#retryButton").addEventListener("click", reloadStage);
      $("#newWindowButton").addEventListener("click", openCurrent);
      $("#fullscreenButton").addEventListener("click", toggleFullscreen);
      $("#officialButton").addEventListener("click", showOfficial);
      $("#scoreButton").addEventListener("click", showScores);
      $("#gifButton").addEventListener("click", showGifs);
      $("#closeModalButton").addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => { if (event.target === modal) closeModal(); });

      document.addEventListener("keydown", (event) => {
        if (!modal.hidden) {
          if (event.key === "Escape") closeModal();
          return;
        }
        if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;
        if (["1", "2", "3"].includes(event.key)) setModel(Number(event.key) - 1);
        else if (event.key === "]") {
          const index = (categoryKeys.indexOf(state.category) + 1) % categoryKeys.length;
          setCategory(categoryKeys[index]);
        } else if (event.key === "[") {
          const index = (categoryKeys.indexOf(state.category) - 1 + categoryKeys.length) % categoryKeys.length;
          setCategory(categoryKeys[index]);
        } else if (event.key.toLowerCase() === "r") reloadStage();
        else if (event.key.toLowerCase() === "f") toggleFullscreen();
        else if (event.key.toLowerCase() === "v") showVideo();
      });

      renderSidebar();
      loadStage();
    })();
  </script>
</body>
</html>
