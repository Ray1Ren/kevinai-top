<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
    <rect width="1600" height="900" fill="#141413" />

  <style>
    .title { font: 700 58px Arial, Helvetica, sans-serif; letter-spacing: -2px; fill: #faf9f5; }
    .kicker { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: 5px; fill: #8ab82f; }
    .sub { font: 400 26px Arial, Helvetica, sans-serif; fill: #b0aea5; }
    .label { font: 700 20px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #b0aea5; }
    .value { font: 700 42px Arial, Helvetica, sans-serif; fill: #faf9f5; }
    .body { font: 400 24px Arial, Helvetica, sans-serif; fill: #faf9f5; }
    .small { font: 400 20px Arial, Helvetica, sans-serif; fill: #b0aea5; }
    .tiny { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #b0aea5; }
    .panel { fill: #201f1d; stroke: #4a4944; stroke-width: 2; }
    .panel2 { fill: #2a2926; stroke: #4a4944; stroke-width: 2; }
    .accent { fill: #8ab82f; }
    .accentText { fill: #8ab82f; }
    .orange { fill: #d97757; }
    .blue { fill: #6a9bcc; }
    .line { stroke: #4a4944; stroke-width: 3; fill: none; }
    .dash { stroke: #4a4944; stroke-width: 3; stroke-dasharray: 12 12; fill: none; }
  </style>

    <text class="kicker" x="92" y="90">A LONGER DIFFICULTY CURVE</text>
    <text class="title" x="92" y="170">500 levels, with new rules along the way.</text>
    <text class="sub" x="92" y="220">Roughly every 10 levels, the player learns one new rule.</text>
    <path d="M 140 640 C 320 520, 370 590, 520 480 S 770 510, 900 400 S 1180 440, 1450 300" stroke="#4a4944" stroke-width="5" fill="none" />

      <circle cx="170" cy="620" r="18" fill="#6a9bcc" stroke="#141413" stroke-width="7" />
      <line x1="170" y1="596" x2="170" y2="538" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="170" y="522" text-anchor="middle" style="font-size:15px">BASE MOVE</text>

      <circle cx="365" cy="535" r="18" fill="#6a9bcc" stroke="#141413" stroke-width="7" />
      <line x1="365" y1="511" x2="365" y2="453" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="365" y="437" text-anchor="middle" style="font-size:15px">MUD</text>

      <circle cx="555" cy="465" r="18" fill="#8ab82f" stroke="#141413" stroke-width="7" />
      <line x1="555" y1="441" x2="555" y2="383" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="555" y="367" text-anchor="middle" style="font-size:15px">TURN ARROWS</text>

      <circle cx="750" cy="455" r="18" fill="#7f7398" stroke="#141413" stroke-width="7" />
      <line x1="750" y1="431" x2="750" y2="373" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="750" y="357" text-anchor="middle" style="font-size:15px">OFFSIDE</text>

      <circle cx="945" cy="375" r="18" fill="#d97757" stroke="#141413" stroke-width="7" />
      <line x1="945" y1="351" x2="945" y2="293" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="945" y="277" text-anchor="middle" style="font-size:13px">TEAMMATES + RIVALS</text>

      <circle cx="1135" cy="360" r="18" fill="#6a9bcc" stroke="#141413" stroke-width="7" />
      <line x1="1135" y1="336" x2="1135" y2="278" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="1135" y="262" text-anchor="middle" style="font-size:15px">GOALKEEPERS</text>

      <circle cx="1305" cy="315" r="18" fill="#7f7398" stroke="#141413" stroke-width="7" />
      <line x1="1305" y1="291" x2="1305" y2="233" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="1305" y="217" text-anchor="middle" style="font-size:15px">CARDS + PORTALS</text>

      <circle cx="1450" cy="300" r="18" fill="#8ab82f" stroke="#141413" stroke-width="7" />
      <line x1="1450" y1="276" x2="1450" y2="218" stroke="#4a4944" stroke-width="2" />
      <text class="tiny" x="1450" y="202" text-anchor="middle" style="font-size:15px">LEVEL 500</text>

    <rect class="panel" x="92" y="724" width="1416" height="112" rx="26" />
    <circle cx="152" cy="780" r="22" fill="none" stroke="#8ab82f" stroke-width="6" />
    <path d="M 139 780 l 9 9 18 -22" stroke="#8ab82f" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <text class="body" x="196" y="775">Every level has a solver-verified route.</text>
    <text class="small" x="196" y="809">The rules stack gradually, so the difficulty rises one step at a time.</text>

  </svg>