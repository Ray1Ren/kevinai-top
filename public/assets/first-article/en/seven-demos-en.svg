<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
    <rect width="1600" height="900" fill="#141413" />

  <style>
    .title { font: 700 58px Arial, Helvetica, sans-serif; letter-spacing: -2px; fill: #faf9f5; }
    .kicker { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: 5px; fill: #8ab82f; }
    .sub { font: 400 26px Arial, Helvetica, sans-serif; fill: #b0aea5; }
    .label { font: 700 20px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #b0aea5; }
    .value { font: 700 42px Arial, Helvetica, sans-serif; fill: #faf9f5; }
    .body { font: 400 24px Arial, Helvetica, sans-serif; fill: #faf9f5; }
    .small { font: 400 20px Arial, Helvetica, sans-serif; fill: #b0aea5; }
    .tiny { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #b0aea5; }
    .panel { fill: #201f1d; stroke: #4a4944; stroke-width: 2; }
    .panel2 { fill: #2a2926; stroke: #4a4944; stroke-width: 2; }
    .accent { fill: #8ab82f; }
    .accentText { fill: #8ab82f; }
    .orange { fill: #d97757; }
    .blue { fill: #6a9bcc; }
    .line { stroke: #4a4944; stroke-width: 3; fill: none; }
    .dash { stroke: #4a4944; stroke-width: 3; stroke-dasharray: 12 12; fill: none; }
  </style>

    <text class="kicker" x="92" y="90">SEVEN DEMOS, ONE CUT</text>
    <text class="title" x="92" y="170">Seven demos in one day. I cut one the next.</text>
    <text class="sub" x="92" y="220">The discarded idea worked. It just made the first play session harder to understand.</text>

      <rect x="92" y="300" width="210" height="178" rx="26" fill="#201f1d" stroke="#4a4944" stroke-width="3" />
      <circle cx="197" cy="372" r="35" fill="#6a9bcc" opacity="0.88" />
      <path d="M 172 372 h 50 M 197 347 v 50" stroke="#141413" stroke-width="8" stroke-linecap="round" />
      <text class="tiny" x="197" y="445" text-anchor="middle">MUD</text>


      <rect x="342" y="300" width="210" height="178" rx="26" fill="#201f1d" stroke="#4a4944" stroke-width="3" />
      <circle cx="447" cy="372" r="35" fill="#8ab82f" opacity="0.88" />
      <path d="M 422 372 h 50 M 447 347 v 50" stroke="#141413" stroke-width="8" stroke-linecap="round" />
      <text class="tiny" x="447" y="445" text-anchor="middle">TURN ARROWS</text>


      <rect x="592" y="300" width="210" height="178" rx="26" fill="#201f1d" stroke="#4a4944" stroke-width="3" />
      <circle cx="697" cy="372" r="35" fill="#7f7398" opacity="0.88" />
      <path d="M 672 372 h 50 M 697 347 v 50" stroke="#141413" stroke-width="8" stroke-linecap="round" />
      <text class="tiny" x="697" y="445" text-anchor="middle">OFFSIDE</text>


      <rect x="92" y="520" width="210" height="178" rx="26" fill="#201f1d" stroke="#4a4944" stroke-width="3" />
      <circle cx="197" cy="592" r="35" fill="#8ab82f" opacity="0.88" />
      <path d="M 172 592 h 50 M 197 567 v 50" stroke="#141413" stroke-width="8" stroke-linecap="round" />
      <text class="tiny" x="197" y="665" text-anchor="middle">TEAMMATES</text>


      <rect x="342" y="520" width="210" height="178" rx="26" fill="#201f1d" stroke="#4a4944" stroke-width="3" />
      <circle cx="447" cy="592" r="35" fill="#7f7398" opacity="0.88" />
      <path d="M 422 592 h 50 M 447 567 v 50" stroke="#141413" stroke-width="8" stroke-linecap="round" />
      <text class="tiny" x="447" y="665" text-anchor="middle">GOALKEEPER</text>


      <rect x="592" y="520" width="210" height="178" rx="26" fill="#201f1d" stroke="#d97757" stroke-width="3" />
      <circle cx="697" cy="592" r="35" fill="#d97757" opacity="0.88" />
      <path d="M 672 592 h 50 M 697 567 v 50" stroke="#141413" stroke-width="8" stroke-linecap="round" />
      <text class="tiny" x="697" y="665" text-anchor="middle">MOVING DEFENSE</text>
      <path d="M 620 548 L 774 670 M 774 548 L 620 670" stroke="#d97757" stroke-width="12" stroke-linecap="round" />

    <rect class="panel2" x="884" y="300" width="624" height="398" rx="34" />
    <text class="label" x="944" y="374">THE QUESTION I HAD TO ASK</text>
    <text class="value" x="944" y="448" style="font-size:34px">Did it make the game better?</text>
    <line x1="944" y1="486" x2="1448" y2="486" stroke="#4a4944" stroke-width="2" />
    <text class="body" x="944" y="552">It was possible to build.</text>
    <text class="body" x="944" y="604">It was not worth keeping.</text>
    <text x="944" y="666" style="font:700 27px Arial;fill:#d97757">I REMOVED MOVING DEFENSE.</text>
    <text class="small" x="92" y="824">AI got me from idea to demo faster. It could not tell me which idea belonged in the game.</text>

  </svg>