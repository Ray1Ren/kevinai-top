<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
    <rect width="1600" height="900" fill="#141413" />

  <style>
    .title { font: 700 58px Arial, Helvetica, sans-serif; letter-spacing: -2px; fill: #faf9f5; }
    .kicker { font: 700 18px Arial, Helvetica, sans-serif; letter-spacing: 5px; fill: #8ab82f; }
    .sub { font: 400 26px Arial, Helvetica, sans-serif; fill: #b0aea5; }
    .label { font: 700 20px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #b0aea5; }
    .value { font: 700 42px Arial, Helvetica, sans-serif; fill: #faf9f5; }
    .body { font: 400 24px Arial, Helvetica, sans-serif; fill: #faf9f5; }
    .small { font: 400 20px Arial, Helvetica, sans-serif; fill: #b0aea5; }
    .tiny { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #b0aea5; }
    .panel { fill: #201f1d; stroke: #4a4944; stroke-width: 2; }
    .panel2 { fill: #2a2926; stroke: #4a4944; stroke-width: 2; }
    .accent { fill: #8ab82f; }
    .accentText { fill: #8ab82f; }
    .orange { fill: #d97757; }
    .blue { fill: #6a9bcc; }
    .line { stroke: #4a4944; stroke-width: 3; fill: none; }
    .dash { stroke: #4a4944; stroke-width: 3; stroke-dasharray: 12 12; fill: none; }
  </style>

    <text class="kicker" x="92" y="90">THE GAP I DID NOT SEE ON DAY TWO</text>
    <text class="title" x="92" y="170">The demo worked. It was not ready to ship.</text>
    <text class="sub" x="92" y="220">The demo proved the idea. The release had to work on a real phone and pass review.</text>
    <rect class="panel" x="92" y="286" width="620" height="480" rx="34" />
    <rect class="panel2" x="888" y="286" width="620" height="480" rx="34" />
    <text class="label" x="142" y="352">1-DAY DEMO</text>
    <text class="value" x="142" y="416">The code ran.</text>

      <circle cx="158" cy="493" r="7" class="blue" />
      <text class="body" x="184" y="501">A playable board</text>

      <circle cx="158" cy="556" r="7" class="blue" />
      <text class="body" x="184" y="564">Win and lose states</text>

      <circle cx="158" cy="619" r="7" class="blue" />
      <text class="body" x="184" y="627">One screen size</text>

      <circle cx="158" cy="682" r="7" class="blue" />
      <text class="body" x="184" y="690">Enough to test the idea</text>

    <text class="label" x="938" y="352">23 MORE DAYS</text>
    <text class="value" x="938" y="416">It worked on a phone.</text>

      <circle cx="954" cy="493" r="7" class="accent" />
      <text class="body" x="980" y="501">Small screens and touch</text>

      <circle cx="954" cy="556" r="7" class="accent" />
      <text class="body" x="980" y="564">Onboarding and difficulty</text>

      <circle cx="954" cy="619" r="7" class="accent" />
      <text class="body" x="980" y="627">Voice, package size, privacy</text>

      <circle cx="954" cy="682" r="7" class="accent" />
      <text class="body" x="980" y="690">Platform rules and review</text>

    <line x1="748" y1="526" x2="852" y2="526" stroke="#d97757" stroke-width="10" />
    <line x1="800" y1="474" x2="800" y2="578" stroke="#d97757" stroke-width="10" />
    <text class="small" x="800" y="824" text-anchor="middle">The real phone was where the unfinished work showed up.</text>

  </svg>