<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#172d33">
  <title>Sling Siege / 弹弓攻城</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar" aria-label="游戏状态">
      <div class="brand-lockup">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <strong>Sling Siege</strong>
          <span>弹弓攻城</span>
        </div>
      </div>

      <div class="hud" aria-live="polite">
        <div class="hud-item"><span>关卡</span><strong id="levelValue">1 / 3</strong></div>
        <div class="hud-item"><span>分数</span><strong id="scoreValue">0</strong></div>
        <div class="hud-item ammo-item"><span>弹药</span><strong id="shotsValue">● ● ●</strong></div>
      </div>

      <div class="controls">
        <button id="pauseButton" class="icon-button" type="button" aria-label="暂停游戏" title="暂停 / 继续">
          <span class="pause-icon" aria-hidden="true"></span>
        </button>
        <button id="restartButton" class="icon-button" type="button" aria-label="重玩本关" title="重玩本关">
          <span class="restart-icon" aria-hidden="true"></span>
        </button>
        <button id="muteButton" class="icon-button" type="button" aria-label="静音" title="静音">
          <span class="sound-icon" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <section id="gameFrame" class="game-frame" aria-label="弹弓攻城游戏区">
      <canvas id="gameCanvas" width="1280" height="720" aria-label="拖动左侧能量弹，松开发射"></canvas>
      <div id="screenFlash" class="screen-flash" aria-hidden="true"></div>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>

      <div id="startOverlay" class="overlay start-overlay">
        <div class="intro-panel">
          <div class="eyebrow">原创物理攻城游戏</div>
          <h1><span>Sling Siege</span>弹弓攻城</h1>
          <p>拖住能量弹向后蓄力，松手轰塌右侧堡垒。飞行途中点击画面或按下空格，释放一次震荡脉冲。</p>
          <div class="how-to">
            <div><span class="gesture drag-gesture" aria-hidden="true"></span><strong>拖拽瞄准</strong></div>
            <div><span class="gesture release-gesture" aria-hidden="true"></span><strong>松开发射</strong></div>
            <div><span class="gesture pulse-gesture" aria-hidden="true"></span><strong>空中脉冲</strong></div>
          </div>
          <button id="startButton" class="primary-button" type="button">开始攻城</button>
          <div class="record-line">最高分 <strong id="bestScoreValue">0</strong> · 已解锁 <strong id="unlockedValue">1</strong> / 3</div>
        </div>
        <div class="intro-art" aria-hidden="true">
          <div class="moon"></div>
          <div class="tower-silhouette tower-one"></div>
          <div class="tower-silhouette tower-two"></div>
          <div class="orb-preview"><span></span></div>
          <div class="arc-preview"></div>
        </div>
      </div>

      <div id="pauseOverlay" class="overlay compact-overlay hidden">
        <div class="result-panel">
          <div class="result-kicker">战场已冻结</div>
          <h2>暂停</h2>
          <p>调整一下策略，准备好再继续。</p>
          <button id="resumeButton" class="primary-button" type="button">继续游戏</button>
        </div>
      </div>

      <div id="resultOverlay" class="overlay compact-overlay hidden">
        <div class="result-panel">
          <div id="resultKicker" class="result-kicker">堡垒已突破</div>
          <h2 id="resultTitle">关卡完成</h2>
          <p id="resultText">守卫全部被击退。</p>
          <div class="result-score"><span>本局分数</span><strong id="resultScore">0</strong></div>
          <div class="result-actions">
            <button id="secondaryResultButton" class="secondary-button" type="button">重玩本关</button>
            <button id="primaryResultButton" class="primary-button" type="button">下一关</button>
          </div>
        </div>
      </div>
    </section>

    <footer class="helpbar">
      <span><i class="help-dot aim-dot"></i>拖住左侧能量弹向后拉</span>
      <span><i class="help-dot ability-dot"></i>飞行中点击或按 Space 释放脉冲</span>
      <span id="statusHint">瞄准核心支柱，连锁撞塌堡垒</span>
    </footer>
  </main>
  <script src="game.js"></script>
  <script src="/bundles/i18n.js"></script>
</body>
</html>
